name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check for pending changesets
        id: guard
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md')" ]; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; skipping alpha release."
          else
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: startsWith(github.ref, 'refs/tags/') || steps.guard.outputs.pending == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: startsWith(github.ref, 'refs/tags/') || steps.guard.outputs.pending == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: startsWith(github.ref, 'refs/tags/') || steps.guard.outputs.pending == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm verify

      - name: Publish to latest tag
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm changeset publish --no-git-tag

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: github.ref == 'refs/heads/main' && steps.guard.outputs.pending == 'true'
        run: pnpm build

      - name: Version snapshot
        if: github.ref == 'refs/heads/main' && steps.guard.outputs.pending == 'true'
        run: pnpm changeset version --snapshot alpha

      - name: Publish to alpha tag
        if: github.ref == 'refs/heads/main' && steps.guard.outputs.pending == 'true'
        run: pnpm changeset publish --tag alpha --no-git-tag
