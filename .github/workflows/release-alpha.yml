name: Release Alpha

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-alpha
  cancel-in-progress: false

jobs:
  alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check for pending changesets
        id: guard
        run: |
          if [ -z "$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md')" ]; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; skipping alpha release."
          else
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.guard.outputs.pending == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        if: steps.guard.outputs.pending == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.guard.outputs.pending == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.pending == 'true'
        run: pnpm build

      - name: Version snapshot
        if: steps.guard.outputs.pending == 'true'
        run: pnpm changeset version --snapshot alpha

      - name: Publish to alpha tag
        if: steps.guard.outputs.pending == 'true'
        run: pnpm changeset publish --tag alpha --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
